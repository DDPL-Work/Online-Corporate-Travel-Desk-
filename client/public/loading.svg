<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      .plane-group {
        fill: #c29f38;
      }
      .trail-path {
        fill: none;
        stroke: #c29f38;
        stroke-width: 4;
        stroke-linecap: round;
        opacity: 0.8;
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <g transform="translate(250, 250)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0" 
      to="360" 
      dur="3s" 
      repeatCount="indefinite"
    />

    <g>
      <path d="M 0,-120 A 120,120 0 0,0 -90,-79" class="trail-path" stroke-width="5" />
      <path d="M -90,-79 A 120,120 0 0,0 -115,-33" class="trail-path" stroke-width="3" />
      <path d="M -115,-33 A 120,120 0 0,0 -120,0" class="trail-path" stroke-width="1" />
      
      <g transform="translate(0, -120) rotate(90) scale(1.1)" class="plane-group">
        <path d="M0,-22 C1.5,-22 2.8,-18 3.5,-12 L24,12 C25,13.5 24.5,15 22.5,15 L6,10 L4,20 L10,24 C10.5,24.5 10.5,25.5 9,25.5 L0,23.5 L-9,25.5 C-10.5,25.5 -10.5,24.5 -10,24 L-4,20 L-6,10 L-22.5,15 C-24.5,15 -25,13.5 -24,12 L-3.5,-12 C-2.8,-18 -1.5,-22 0,-22 Z" />
      </g>
    </g>

    <g transform="rotate(180)">
      <path d="M 0,-120 A 120,120 0 0,0 -90,-79" class="trail-path" stroke-width="5" />
      <path d="M -90,-79 A 120,120 0 0,0 -115,-33" class="trail-path" stroke-width="3" />
      <path d="M -115,-33 A 120,120 0 0,0 -120,0" class="trail-path" stroke-width="1" />
      
      <g transform="translate(0, -120) rotate(90) scale(1.1)" class="plane-group">
        <path d="M0,-22 C1.5,-22 2.8,-18 3.5,-12 L24,12 C25,13.5 24.5,15 22.5,15 L6,10 L4,20 L10,24 C10.5,24.5 10.5,25.5 9,25.5 L0,23.5 L-9,25.5 C-10.5,25.5 -10.5,24.5 -10,24 L-4,20 L-6,10 L-22.5,15 C-24.5,15 -25,13.5 -24,12 L-3.5,-12 C-2.8,-18 -1.5,-22 0,-22 Z" />
      </g>
    </g>
  </g>
</svg>