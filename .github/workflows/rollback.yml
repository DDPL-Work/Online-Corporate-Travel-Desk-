name: Rollback

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: ["Deploy Backend", "Deploy Frontend"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Rollback target release"
        required: false
        default: "previous"
        type: choice
        options:
          - previous
          - specific
      specific-release:
        description: "Specific release name (if target=specific)"
        required: false
        default: ""
        type: string
      servers:
        description: "Servers to rollback"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - server1
          - server2
      confirm:
        description: "Type 'rollback' to confirm"
        required: true
        default: ""
        type: string

env:
  APP_PATH: /var/www/Online-Corporate-Travel-Desk-
  SSH_USER: deploy
  SERVER1_IP: ${{ secrets.SERVER1_IP }}
  SERVER2_IP: ${{ secrets.SERVER2_IP }}
  DO_LB_ID: ${{ secrets.DO_LB_ID }}
  DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}

concurrency:
  group: rollback-${{ github.ref }}
  cancel-in-progress: true

jobs:
  should-rollback:
    name: Should Rollback?
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' }}
    outputs:
      execute: ${{ steps.decision.outputs.execute }}
    steps:
      - name: Check if rollback is needed
        id: decision
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"

          echo "Triggering workflow: ${WORKFLOW_NAME} (${CONCLUSION})"

          if [ "${CONCLUSION}" = "failure" ] || [ "${CONCLUSION}" = "timed_out" ]; then
            echo "execute=true" >> $GITHUB_OUTPUT
            echo "Rollback triggered due to ${WORKFLOW_NAME} ${CONCLUSION}"
          else
            echo "execute=false" >> $GITHUB_OUTPUT
            echo "No rollback needed (${CONCLUSION})"
          fi

  rollback-server1:
    name: Rollback Server 1
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'rollback' && (github.event.inputs.servers == 'both' || github.event.inputs.servers == 'server1')) || (github.event_name == 'workflow_run' && needs.should-rollback.outputs.execute == 'true') }}
    needs: [should-rollback]
    outputs:
      status: ${{ steps.rollback-status.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER1_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.SERVER2_IP }} >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'CFG'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            User ${{ secrets.SSH_USER }}
          CFG

      - name: Test SSH
        run: |
          ssh -o ConnectTimeout=10 "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" "echo SSH_OK"

      - name: Remove Server 1 from Load Balancer
        if: ${{ env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          echo "Removing Server 1 from LB..."
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER1_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X DELETE \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets/$DROPLET_ID"
            sleep 15
          fi

      - name: List Available Releases
        run: |
          echo "Available releases on Server 1:"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" \
            "ls -1d ${APP_PATH}/releases/*/" 2>/dev/null || echo "No releases found."

      - name: Execute Rollback on Server 1
        id: rollback
        run: |
          scp deployment/scripts/rollback.sh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}:/tmp/rollback.sh"

          ROLLBACK_TARGET="previous"
          if [[ "${{ github.event.inputs.target }}" == "specific" ]] && [[ -n "${{ github.event.inputs.specific-release }}" ]]; then
            ROLLBACK_TARGET="${{ github.event.inputs.specific-release }}"
          fi

          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" \
            "APP_PATH=${APP_PATH} \
             ROLLBACK_TARGET=${ROLLBACK_TARGET} \
             ROLLBACK_CONFIRMED=true \
             DEPLOYED_BY=${{ github.actor }} \
             bash /tmp/rollback.sh"

          echo "Rollback executed on Server 1."
        timeout-minutes: 10

      - name: Verify Health After Rollback
        id: verify
        run: |
          scp deployment/scripts/health-check.sh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}:/tmp/health-check.sh"
          if ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" \
            "APP_PATH=${APP_PATH} bash /tmp/health-check.sh"; then
            echo "Server 1 healthy after rollback."
          else
            echo "::error::Server 1 UNHEALTHY after rollback — manual intervention required."
            exit 1
          fi
        timeout-minutes: 5

      - name: Add Server 1 Back to Load Balancer
        if: ${{ always() && env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER1_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              -d "{\"droplet_ids\": [$DROPLET_ID]}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets"
            echo "Server 1 added back to LB."
            sleep 30
          fi

      - name: Rollback Status
        id: rollback-status
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.verify.outcome }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

  rollback-server2:
    name: Rollback Server 2
    runs-on: ubuntu-latest
    needs: [rollback-server1]
    if: ${{ always() && needs.rollback-server1.outputs.status == 'success' && ((github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'rollback' && (github.event.inputs.servers == 'both' || github.event.inputs.servers == 'server2')) || (github.event_name == 'workflow_run')) }}
    outputs:
      status: ${{ steps.rollback-status.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER2_IP }} >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'CFG'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            User ${{ secrets.SSH_USER }}
          CFG

      - name: Remove Server 2 from Load Balancer
        if: ${{ env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER2_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X DELETE \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets/$DROPLET_ID"
            sleep 15
          fi

      - name: Execute Rollback on Server 2
        run: |
          scp deployment/scripts/rollback.sh "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}:/tmp/rollback.sh"

          ROLLBACK_TARGET="previous"
          if [[ "${{ github.event.inputs.target }}" == "specific" ]] && [[ -n "${{ github.event.inputs.specific-release }}" ]]; then
            ROLLBACK_TARGET="${{ github.event.inputs.specific-release }}"
          fi

          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}" \
            "APP_PATH=${APP_PATH} \
             ROLLBACK_TARGET=${ROLLBACK_TARGET} \
             ROLLBACK_CONFIRMED=true \
             DEPLOYED_BY=${{ github.actor }} \
             bash /tmp/rollback.sh"
        timeout-minutes: 10

      - name: Verify Health After Rollback
        run: |
          scp deployment/scripts/health-check.sh "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}:/tmp/health-check.sh"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}" \
            "APP_PATH=${APP_PATH} bash /tmp/health-check.sh"
        timeout-minutes: 5

      - name: Add Server 2 Back to Load Balancer
        if: ${{ always() && env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER2_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              -d "{\"droplet_ids\": [$DROPLET_ID]}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets"
            sleep 30
          fi

      - name: Rollback Status
        id: rollback-status
        if: ${{ always() }}
        run: |
          if [[ "${{ steps.verify.outcome }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
          fi

  notify:
    name: Rollback Notification
    runs-on: ubuntu-latest
    needs: [rollback-server1, rollback-server2]
    if: ${{ always() }}
    steps:
      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.rollback-server1.outputs.status }}" == "success" ]]; then
            echo "status=Rollback Completed" >> $GITHUB_OUTPUT
            echo "color=36a64f" >> $GITHUB_OUTPUT
          else
            echo "status=Rollback Failed" >> $GITHUB_OUTPUT
            echo "color=d00000" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack webhook not configured — skipping notification."
            exit 0
          fi

          curl -s -X POST -H 'Content-type: application/json' \
            --data "{
              \"attachments\": [{
                \"color\": \"${{ steps.status.outputs.color }}\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"🔄 ${{ steps.status.outputs.status }}\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"Server 1: ${{ needs.rollback-server1.outputs.status }}\nServer 2: ${{ needs.rollback-server2.outputs.status }}\"
                    }
                  },
                  {
                    \"type\": \"context\",
                    \"elements\": [
                      {
                        \"type\": \"mrkdwn\",
                        \"text\": \"<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Rollback Run>\"
                      }
                    ]
                  }
                ]
              }]
            }" "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
