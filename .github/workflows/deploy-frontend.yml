name: Deploy Frontend

permissions:
  contents: read
  actions: read

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "super-admin/**"
      - "deployment/scripts/deploy-client.sh"
      - "deployment/scripts/deploy-admin.sh"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      server:
        description: "Target server"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - server1
          - server2
      skip-build:
        description: "Skip build step (use existing artifacts)"
        required: false
        default: false
        type: boolean

env:
  APP_PATH: /var/www/Online-Corporate-Travel-Desk-
  SSH_USER: deploy
  SERVER1_IP: ${{ secrets.SERVER1_IP }}
  SERVER2_IP: ${{ secrets.SERVER2_IP }}
  DO_LB_ID: ${{ secrets.DO_LB_ID }}
  DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
  NODE_VERSION: "20"

concurrency:
  group: frontend-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check Required Secrets
        run: |
          required=("SSH_PRIVATE_KEY" "SSH_USER" "SERVER1_IP" "SERVER2_IP" "DO_API_TOKEN" "DO_LB_ID")
          missing=0
          for s in "${required[@]}"; do
            if [[ -z "${!s}" ]]; then
              echo "::error::Missing required secret: $s"
              ((missing++))
            fi
          done
          if [ "$missing" -gt 0 ]; then exit 1; fi
          echo "All required secrets present."
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SERVER1_IP: ${{ secrets.SERVER1_IP }}
          SERVER2_IP: ${{ secrets.SERVER2_IP }}
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          DO_LB_ID: ${{ secrets.DO_LB_ID }}

  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ !inputs.skip-build }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci

      - name: Build Client
        run: |
          cd client
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      - name: Package Client Build
        run: |
          cd client/dist
          tar czf /tmp/client-dist.tar.gz .

      - name: Upload Client Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: /tmp/client-dist.tar.gz
          retention-days: 1

  build-admin:
    name: Build Super Admin
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ !inputs.skip-build }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: super-admin/package-lock.json

      - name: Install Super Admin Dependencies
        run: |
          cd super-admin
          npm ci

      - name: Build Super Admin
        run: |
          cd super-admin
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.SUPER_ADMIN_API_BASE_URL }}

      - name: Package Super Admin Build
        run: |
          cd super-admin/dist
          tar czf /tmp/admin-dist.tar.gz .

      - name: Upload Super Admin Artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: /tmp/admin-dist.tar.gz
          retention-days: 1

  deploy-to-server1:
    name: Deploy to Server 1
    runs-on: ubuntu-latest
    needs: [build-client, build-admin]
    if: ${{ github.event.inputs.server == 'both' || github.event.inputs.server == 'server1' || github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Client Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: /tmp

      - name: Download Admin Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: /tmp

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER1_IP }} >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'CFG'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            User ${{ secrets.SSH_USER }}
            ServerAliveInterval 30
            ServerAliveCountMax 3
          CFG

      - name: Pre-Deployment Validation
        run: |
          ssh -o ConnectTimeout=10 "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" "echo SSH_OK && command -v pm2 && command -v node && test -d ${{ env.APP_PATH }}" || { echo "::error::Pre-deployment checks failed"; exit 1; }

      - name: Remove Server 1 from Load Balancer
        if: ${{ env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          echo "Removing Server 1 from LB..."
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER1_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X DELETE \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets/$DROPLET_ID"
            echo "Removed from LB."
            sleep 15
          fi

      - name: Deploy Client to Server 1
        run: |
          scp /tmp/client-dist.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}:/tmp/client-dist.tar.gz"
          scp deployment/scripts/deploy-client.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}:/tmp/deploy-client.sh"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" \
            "APP_PATH=${{ env.APP_PATH }} \
             COMMIT_HASH=${{ github.sha }} \
             ARTIFACT_NAME=client-dist \
             ARTIFACT_PATH=/tmp/client-dist.tar.gz \
             CLIENT_DIR=${{ env.APP_PATH }}/client \
             bash /tmp/deploy-client.sh"
        timeout-minutes: 10

      - name: Deploy Super Admin to Server 1
        run: |
          scp /tmp/admin-dist.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}:/tmp/admin-dist.tar.gz"
          scp deployment/scripts/deploy-admin.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}:/tmp/deploy-admin.sh"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER1_IP }}" \
            "APP_PATH=${{ env.APP_PATH }} \
             COMMIT_HASH=${{ github.sha }} \
             ARTIFACT_NAME=admin-dist \
             ARTIFACT_PATH=/tmp/admin-dist.tar.gz \
             ADMIN_DIR=${{ env.APP_PATH }}/super-admin \
             bash /tmp/deploy-admin.sh"
        timeout-minutes: 10

      - name: Validate Frontend Assets
        run: |
          INDEX_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://${{ secrets.SERVER1_IP }}:80/" 2>/dev/null || echo "FAIL")
          echo "Server 1 frontend: HTTP $INDEX_CODE"

      - name: Add Server 1 Back to Load Balancer
        if: ${{ always() && env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER1_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              -d "{\"droplet_ids\": [$DROPLET_ID]}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets"
            echo "Server 1 added back to LB."
            sleep 30
          fi

  deploy-to-server2:
    name: Deploy to Server 2
    runs-on: ubuntu-latest
    needs: [deploy-to-server1]
    if: ${{ always() && (github.event.inputs.server == 'both' || github.event.inputs.server == 'server2' || github.event_name == 'push') }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Client Artifact
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: /tmp

      - name: Download Admin Artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: /tmp

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER2_IP }} >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << 'CFG'
          Host *
            IdentityFile ~/.ssh/id_ed25519
            StrictHostKeyChecking no
            User ${{ secrets.SSH_USER }}
            ServerAliveInterval 30
            ServerAliveCountMax 3
          CFG

      - name: Pre-Deployment Validation
        run: |
          ssh -o ConnectTimeout=10 "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}" "echo SSH_OK && command -v pm2 && command -v node && test -d ${{ env.APP_PATH }}" || { echo "::error::Pre-deployment checks failed"; exit 1; }

      - name: Remove Server 2 from Load Balancer
        if: ${{ env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          echo "Removing Server 2 from LB..."
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER2_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X DELETE \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets/$DROPLET_ID"
            echo "Removed from LB."
            sleep 15
          fi

      - name: Deploy Client to Server 2
        run: |
          scp /tmp/client-dist.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}:/tmp/client-dist.tar.gz"
          scp deployment/scripts/deploy-client.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}:/tmp/deploy-client.sh"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}" \
            "APP_PATH=${{ env.APP_PATH }} \
             COMMIT_HASH=${{ github.sha }} \
             ARTIFACT_NAME=client-dist \
             ARTIFACT_PATH=/tmp/client-dist.tar.gz \
             CLIENT_DIR=${{ env.APP_PATH }}/client \
             bash /tmp/deploy-client.sh"
        timeout-minutes: 10

      - name: Deploy Super Admin to Server 2
        run: |
          scp /tmp/admin-dist.tar.gz \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}:/tmp/admin-dist.tar.gz"
          scp deployment/scripts/deploy-admin.sh \
            "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}:/tmp/deploy-admin.sh"
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SERVER2_IP }}" \
            "APP_PATH=${{ env.APP_PATH }} \
             COMMIT_HASH=${{ github.sha }} \
             ARTIFACT_NAME=admin-dist \
             ARTIFACT_PATH=/tmp/admin-dist.tar.gz \
             ADMIN_DIR=${{ env.APP_PATH }}/super-admin \
             bash /tmp/deploy-admin.sh"
        timeout-minutes: 10

      - name: Validate Frontend Assets
        run: |
          INDEX_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 "http://${{ secrets.SERVER2_IP }}:80/" 2>/dev/null || echo "FAIL")
          echo "Server 2 frontend: HTTP $INDEX_CODE"

      - name: Add Server 2 Back to Load Balancer
        if: ${{ always() && env.DO_LB_ID != '' && env.DO_API_TOKEN != '' }}
        run: |
          DROPLET_ID=$(curl -s -X GET \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
            "https://api.digitalocean.com/v2/droplets?page=1&per_page=200" | \
            jq -r --arg ip "${{ secrets.SERVER2_IP }}" '.droplets[]? | select(.networks.v4[]? | .ip_address == $ip) | .id' | head -1)
          if [ -z "$DROPLET_ID" ]; then DROPLET_ID="NOT_FOUND"; fi
          if [ "$DROPLET_ID" != "NOT_FOUND" ]; then
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.DO_API_TOKEN }}" \
              -d "{\"droplet_ids\": [$DROPLET_ID]}" \
              "https://api.digitalocean.com/v2/load_balancers/${{ secrets.DO_LB_ID }}/droplets"
            echo "Server 2 added back to LB."
            sleep 30
          fi

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-to-server1, deploy-to-server2]
    if: ${{ always() }}
    steps:
      - name: Determine Status
        id: status
        run: |
          if [[ "${{ needs.deploy-to-server1.result }}" == "success" ]] && \
             [[ "${{ needs.deploy-to-server2.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Notification
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "Slack webhook not configured — skipping notification."
            exit 0
          fi

          STATUS_EMOJI="${{ steps.status.outputs.status == 'success' && '✅' || '❌' }}"
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"${STATUS_EMOJI} Frontend Deployment ${{ steps.status.outputs.status }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\"
            }" "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
