name: Deploy Client

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        working-directory: client
        run: npm install

      - name: Build
        working-directory: client
        run: npm run build

      - name: Upload Client
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "client/dist/*"
          target: "/var/www/Online-Corporate-Travel-Desk/client"
          strip_components: 2