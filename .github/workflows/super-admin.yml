name: Deploy Super Admin

on:
  push:
    branches:
      - main
    paths:
      - 'super-admin/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        working-directory: super-admin
        run: npm install

      - name: Build
        working-directory: super-admin
        run: npm run build

      - name: Upload Admin
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "super-admin/dist/*"
          target: "/var/www/Online-Corporate-Travel-Desk/super-admin"
          strip_components: 2